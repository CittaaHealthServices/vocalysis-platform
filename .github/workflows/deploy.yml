name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (leave blank for all)'
        required: false
        default: 'all'
        type: choice
        options: [all, api, worker, web, healthcheck, vococore, kintsugi-service]

jobs:

  deploy-api:
    name: Deploy → API
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'api'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        working-directory: api
        run: railway up --service api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-worker:
    name: Deploy → Worker
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'worker'
