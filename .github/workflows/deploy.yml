name: Deploy to Railway

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Force-deploy a specific service (or "all")'
        required: false
        default: 'all'
        type: choice
        options: [all, api, worker, web, healthcheck, vococore, kintsugi-service]

# ─────────────────────────────────────────────────────────────────────────────
# Detect which service directories changed so we only redeploy what's needed
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      api:             ${{ steps.filter.outputs.api }}
      worker:          ${{ steps.filter.outputs.worker }}
      web:             ${{ steps.filter.outputs.web }}
      healthcheck:     ${{ steps.filter.outputs.healthcheck }}
      vococore:        ${{ steps.filter.outputs.vococore }}
      kintsugi:        ${{ steps.filter.outputs.kintsugi }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            worker:
              - 'worker/**'
            web:
              - 'web/**'
            healthcheck:
              - 'healthcheck/**'
            vococore:
              - 'vococore/**'
            kintsugi:
              - 'kintsugi-service/**'

  # ── API ────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy → API
    needs: changes
    if: |
      needs.changes.outputs.api == 'true' ||
      github.event.inputs.service == 'api' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy API service
        working-directory: api
        run: railway up --service api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Worker ─────────────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy → Worker
    needs: changes
    if: |
      needs.changes.outputs.worker == 'true' ||
      github.event.inputs.service == 'worker' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Worker service
        working-directory: worker
        run: railway up --service worker --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Web ────────────────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy → Web
    needs: changes
    if: |
      needs.changes.outputs.web == 'true' ||
      github.event.inputs.service == 'web' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Web service
        working-directory: web
        run: railway up --service web --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Healthcheck ────────────────────────────────────────────────────────────
  deploy-healthcheck:
    name: Deploy → Healthcheck
    needs: changes
    if: |
      needs.changes.outputs.healthcheck == 'true' ||
      github.event.inputs.service == 'healthcheck' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Healthcheck service
        working-directory: healthcheck
        run: railway up --service healthcheck --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── VocoCore (Python/ML) ───────────────────────────────────────────────────
  deploy-vococore:
    name: Deploy → VocoCore
    needs: changes
    if: |
      needs.changes.outputs.vococore == 'true' ||
      github.event.inputs.service == 'vococore' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy VocoCore ML service
        working-directory: vococore
        run: railway up --service vococore --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Kintsugi Service ───────────────────────────────────────────────────────
  deploy-kintsugi:
    name: Deploy → Kintsugi
    needs: changes
    if: |
      needs.changes.outputs.kintsugi == 'true' ||
      github.event.inputs.service == 'kintsugi-service' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Kintsugi service
        working-directory: kintsugi-service
        run: railway up --service kintsugi-service --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
